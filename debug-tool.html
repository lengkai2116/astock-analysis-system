<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>指标IDE调试工具</title>
    <script src="https://unpkg.com/lightweight-charts@4.1.0/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e; 
            color: #e0e0e0; 
            padding: 20px;
        }
        h1 { color: #4fc3f7; margin-bottom: 20px; }
        .section {
            background: #16213e;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .section h2 { color: #4fc3f7; margin-bottom: 15px; font-size: 18px; }
        button {
            background: #4fc3f7;
            color: #1a1a2e;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            margin: 5px;
            font-weight: bold;
        }
        button:hover { background: #81d4fa; }
        button.active { background: #4caf50; }
        button:disabled { background: #666; cursor: not-allowed; }
        .status {
            display: inline-block;
            padding: 5px 10px;
            border-radius: 3px;
            margin-left: 10px;
        }
        .status.success { background: #4caf50; }
        .status.error { background: #f44336; }
        .log {
            background: #0f0f23;
            padding: 15px;
            border-radius: 5px;
            max-height: 300px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            line-height: 1.6;
        }
        .log .info { color: #4fc3f7; }
        .log .success { color: #4caf50; }
        .log .error { color: #f44336; }
        .log .warn { color: #ff9800; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        .metric {
            background: #1e3a5f;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
        }
        .metric-value { font-size: 32px; font-weight: bold; color: #4fc3f7; }
        .metric-label { color: #888; margin-top: 5px; }
        .chart-container { 
            background: #16213e; 
            border-radius: 10px; 
            padding: 10px;
            margin-top: 20px;
        }
        #mainChart { height: 400px; background: #0f0f23; border-radius: 5px; }
        .chip-group { margin: 10px 0; }
        .chip {
            display: inline-block;
            padding: 5px 12px;
            margin: 3px;
            border-radius: 15px;
            background: #333;
            cursor: pointer;
            font-size: 12px;
        }
        .chip.active { background: #4fc3f7; color: #1a1a2e; }
        .chip:hover { background: #555; }
    </style>
</head>
<body>
    <h1>🧪 指标IDE调试工具</h1>
    
    <div class="grid">
        <div class="section">
            <h2>📡 API状态</h2>
            <div class="metric">
                <div class="metric-value" id="apiStatus">-</div>
                <div class="metric-label">API连接状态</div>
            </div>
            <button onclick="testAPI()">🔄 重新测试</button>
        </div>
        
        <div class="section">
            <h2>📊 数据统计</h2>
            <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px;">
                <div class="metric">
                    <div class="metric-value" id="klineCount">0</div>
                    <div class="metric-label">K线数据</div>
                </div>
                <div class="metric">
                    <div class="metric-value" id="overlayCount">0</div>
                    <div class="metric-label">主图指标</div>
                </div>
                <div class="metric">
                    <div class="metric-value" id="subchartCount">0</div>
                    <div class="metric-label">副图指标</div>
                </div>
            </div>
        </div>
    </div>
    
    <div class="section">
        <h2>🔧 控制面板</h2>
        <div>
            <strong>周期：</strong>
            <button class="period-btn active" data-period="D" onclick="switchPeriod('D')">日线</button>
            <button class="period-btn" data-period="W" onclick="switchPeriod('W')">周线</button>
            <button class="period-btn" data-period="M" onclick="switchPeriod('M')">月线</button>
        </div>
        <div class="chip-group">
            <strong>副图指标：</strong>
            <span class="chip active" data-indicator="vol" onclick="toggleIndicator('vol')">VOL</span>
            <span class="chip active" data-indicator="macd" onclick="toggleIndicator('macd')">MACD</span>
            <span class="chip" data-indicator="rsi" onclick="toggleIndicator('rsi')">RSI</span>
            <span class="chip" data-indicator="kdj" onclick="toggleIndicator('kdj')">KDJ</span>
        </div>
        <button onclick="loadChart()">📊 加载图表</button>
        <button onclick="clearChart()">🗑️ 清空图表</button>
    </div>
    
    <div class="section">
        <h2>📈 图表预览</h2>
        <div class="chart-container">
            <div id="mainChart"></div>
        </div>
    </div>
    
    <div class="section">
        <h2>📋 调试日志</h2>
        <div class="log" id="logContent">
            <div class="info">等待测试...</div>
        </div>
        <button onclick="clearLog()">清空日志</button>
    </div>

    <script>
        const API_BASE = 'http://localhost:5001/api/v3/chart';
        let chart = null;
        let candleSeries = null;
        let currentPeriod = 'D';
        let activeIndicators = new Set(['vol', 'macd']);
        let chartData = null;
        
        function log(message, type = 'info') {
            const logContent = document.getElementById('logContent');
            const timestamp = new Date().toLocaleTimeString();
            logContent.innerHTML += `<div class="${type}">[${timestamp}] ${message}</div>\n`;
            logContent.scrollTop = logContent.scrollHeight;
        }
        
        function clearLog() {
            document.getElementById('logContent').innerHTML = '';
        }
        
        function updateMetrics(data) {
            document.getElementById('klineCount').textContent = data.kline.length;
            document.getElementById('overlayCount').textContent = data.overlays.length;
            document.getElementById('subchartCount').textContent = data.subcharts.length;
        }
        
        async function testAPI() {
            log('测试API连接...', 'info');
            const statusEl = document.getElementById('apiStatus');
            statusEl.textContent = '测试中...';
            statusEl.style.color = '#ff9800';
            
            try {
                const response = await fetch('http://localhost:5001/api/v1/health');
                const data = await response.json();
                
                if (data.success) {
                    statusEl.textContent = '✅ 正常';
                    statusEl.style.color = '#4caf50';
                    log('API连接成功！', 'success');
                } else {
                    statusEl.textContent = '❌ 失败';
                    statusEl.style.color = '#f44336';
                    log('API返回失败: ' + data.message, 'error');
                }
            } catch (error) {
                statusEl.textContent = '❌ 错误';
                statusEl.style.color = '#f44336';
                log('API连接失败: ' + error.message, 'error');
            }
        }
        
        async function loadChart() {
            log(`开始加载图表... (周期: ${currentPeriod})`, 'info');
            
            const indicators = 'ma5,ma10,ma20,boll,macd,rsi,kdj,vol';
            const url = `${API_BASE}/kline/000001.SZ?limit=200&period=${currentPeriod}&indicators=${indicators}`;
            
            log(`请求URL: ${url}`, 'info');
            
            try {
                const response = await fetch(url);
                const result = await response.json();
                
                if (!result.success) {
                    log('API返回失败: ' + result.message, 'error');
                    return;
                }
                
                chartData = result.data;
                log(`数据加载成功！`, 'success');
                log(`K线: ${chartData.kline.length} 条`, 'info');
                log(`主图指标: ${chartData.overlays.length} 个`, 'info');
                log(`副图指标: ${chartData.subcharts.length} 个`, 'info');
                
                updateMetrics(chartData);
                renderChart(chartData);
                
            } catch (error) {
                log('加载失败: ' + error.message, 'error');
            }
        }
        
        function renderChart(data) {
            log('开始渲染图表...', 'info');
            
            // 创建或清除图表
            if (!chart) {
                chart = LightweightCharts.createChart(document.getElementById('mainChart'), {
                    width: document.getElementById('mainChart').clientWidth,
                    height: 400,
                    layout: {
                        background: { type: 'solid', color: '#0f0f23' },
                        textColor: '#e0e0e0',
                    },
                    grid: {
                        vertLines: { color: 'rgba(255,255,255,0.1)' },
                        horzLines: { color: 'rgba(255,255,255,0.1)' },
                    },
                });
                
                candleSeries = chart.addCandlestickSeries({
                    upColor: '#26a69a',
                    downColor: '#ef5350',
                });
            }
            
            // 设置K线数据
            const klineData = data.kline.map(k => ({
                time: k.time,
                open: k.open,
                high: k.high,
                low: k.low,
                close: k.close,
            }));
            
            candleSeries.setData(klineData);
            log(`K线数据设置完成: ${klineData.length} 条`, 'success');
            
            // 添加主图指标
            data.overlays.forEach(overlay => {
                log(`添加指标: ${overlay.id}`, 'info');
            });
            
            chart.timeScale().fitContent();
            log('图表渲染完成！', 'success');
        }
        
        function clearChart() {
            if (chart) {
                chart.remove();
                chart = null;
                candleSeries = null;
            }
            document.getElementById('mainChart').innerHTML = '';
            log('图表已清空', 'warn');
        }
        
        function switchPeriod(period) {
            document.querySelectorAll('.period-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.dataset.period === period) {
                    btn.classList.add('active');
                }
            });
            currentPeriod = period;
            log(`切换到${period === 'D' ? '日线' : period === 'W' ? '周线' : '月线'}`, 'info');
            loadChart();
        }
        
        function toggleIndicator(indicator) {
            const chip = document.querySelector(`.chip[data-indicator="${indicator}"]`);
            if (activeIndicators.has(indicator)) {
                activeIndicators.delete(indicator);
                chip.classList.remove('active');
                log(`关闭 ${indicator}`, 'warn');
            } else {
                activeIndicators.add(indicator);
                chip.classList.add('active');
                log(`开启 ${indicator}`, 'success');
            }
            
            // 重新渲染
            if (chartData) {
                log('重新渲染图表...', 'info');
                clearChart();
                renderChart(chartData);
            }
        }
        
        // 初始化
        window.onload = function() {
            log('🧪 指标IDE调试工具已启动', 'success');
            log('点击"加载图表"按钮开始测试', 'info');
            testAPI();
        };
    </script>
</body>
</html>
