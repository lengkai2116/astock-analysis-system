<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>指标IDE - QuantDinger</title>
  <script src="https://cdn.jsdelivr.net/npm/klinecharts@9/dist/klinecharts.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --qd-primary: #1890ff;
      --qd-success: #52c41a;
      --qd-warning: #faad14;
      --qd-error: #f5222d;
      --qd-dark-bg: #141414;
      --qd-dark-surface: #1e1e1e;
      --qd-dark-border: #2a2a2a;
      --qd-dark-text: #d1d4dc;
      --qd-dark-text-secondary: #787b86;
      --qd-dark-grid: #252525;
      --qd-green: #3FB950;
      --qd-red: #F85149;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: var(--qd-dark-bg);
      color: var(--qd-dark-text);
      overflow: hidden;
      height: 100vh;
    }
    #app { height: 100vh; display: flex; }
    
    /* Left Drawer */
    .ide-left {
      width: 400px;
      background: var(--qd-dark-surface);
      border-right: 1px solid var(--qd-dark-border);
      display: flex;
      flex-direction: column;
      transition: transform 0.3s ease;
      position: relative;
    }
    .ide-left.collapsed { transform: translateX(-100%); }
    .ide-left .panel-title {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 12px;
      background: var(--qd-dark-bg);
      border-bottom: 1px solid var(--qd-dark-border);
      cursor: pointer;
    }
    .panel-title__leading { display: flex; align-items: center; gap: 8px; }
    .panel-title__trailing { display: flex; align-items: center; gap: 4px; }
    .panel-title-actions { display: flex; gap: 4px; }
    .panel-title-actions button {
      padding: 4px 8px;
      border: 1px solid var(--qd-dark-border);
      background: transparent;
      color: var(--qd-dark-text-secondary);
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .panel-title-actions button:hover {
      background: rgba(255,255,255,0.05);
      color: var(--qd-dark-text);
    }
    .panel-title-actions button:disabled { opacity: 0.4; cursor: not-allowed; }
    .panel-title-chevron { font-size: 10px; color: var(--qd-dark-text-secondary); }
    .code-panel-body { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .ide-guide-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      background: rgba(24, 144, 255, 0.08);
      border-bottom: 1px solid var(--qd-dark-border);
      font-size: 12px;
      color: var(--qd-dark-text-secondary);
    }
    .ide-guide-link {
      margin-left: auto;
      color: var(--qd-primary);
      text-decoration: none;
      font-size: 11px;
    }
    .code-editor-wrapper { flex: 1; position: relative; }
    .code-editor-area {
      width: 100%;
      height: 100%;
      font-family: 'Monaco', 'Menlo', monospace;
      font-size: 13px;
      line-height: 1.6;
      padding: 12px;
      background: var(--qd-dark-bg);
      border: none;
      color: var(--qd-dark-text);
      resize: none;
      outline: none;
      overflow-y: auto;
    }
    .code-editor-area::placeholder { color: var(--qd-dark-text-secondary); }
    
    /* AI Panel */
    .ai-gen-panel {
      border-top: 1px solid var(--qd-dark-border);
      background: var(--qd-dark-bg);
    }
    .ai-gen-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      cursor: pointer;
      color: var(--qd-dark-text-secondary);
      font-size: 12px;
    }
    .ai-gen-body {
      padding: 12px;
      border-top: 1px solid var(--qd-dark-border);
    }
    .ai-helper-tip {
      font-size: 11px;
      color: var(--qd-dark-text-secondary);
      margin-bottom: 8px;
    }
    .ai-prompt-input {
      width: 100%;
      height: 80px;
      padding: 8px;
      background: var(--qd-dark-bg);
      border: 1px solid var(--qd-dark-border);
      border-radius: 4px;
      color: var(--qd-dark-text);
      font-family: inherit;
      font-size: 12px;
      resize: vertical;
      outline: none;
    }
    .ai-prompt-input:focus { border-color: var(--qd-primary); }
    .ai-prompt-input:disabled { opacity: 0.5; }
    .ai-gen-body button {
      width: 100%;
      padding: 8px;
      background: var(--qd-primary);
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
      margin-top: 8px;
    }
    .ai-gen-body button:hover { background: #40a9ff; }
    .ai-gen-body button:disabled { opacity: 0.5; }
    
    /* Code Rail */
    .ide-code-rail {
      width: 40px;
      background: var(--qd-dark-surface);
      border-right: 1px solid var(--qd-dark-border);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      cursor: pointer;
      writing-mode: vertical-rl;
      padding: 16px 0;
    }
    .ide-code-rail:hover { background: rgba(255,255,255,0.05); }
    .ide-code-rail__icon { font-size: 16px; color: var(--qd-dark-text-secondary); }
    .ide-code-rail__label {
      font-size: 10px;
      color: var(--qd-dark-text-secondary);
      letter-spacing: 2px;
    }
    
    /* Main Right Panel */
    .ide-right {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: var(--qd-dark-bg);
    }
    
    /* Workspace Tabs */
    .ide-workspace-tabs {
      background: var(--qd-dark-surface);
      border-bottom: 1px solid var(--qd-dark-border);
    }
    .ide-workspace-tabs .ant-tabs-tab {
      color: var(--qd-dark-text-secondary);
      font-size: 12px;
      padding: 10px 20px;
    }
    .ide-workspace-tabs .ant-tabs-tab-active {
      color: var(--qd-primary);
      background: var(--qd-dark-bg);
    }
    .ide-workspace-tabs .ant-tabs-ink-bar { background: var(--qd-primary); }
    
    /* Chart Panel */
    .chart-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }
    .chart-panel-toolbar {
      padding: 8px 12px;
      background: var(--qd-dark-surface);
      border-bottom: 1px solid var(--qd-dark-border);
    }
    .chart-panel-toolbar-top {

      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;

    .chart-panel-toolbar-title {

      color: var(--qd-dark-text-secondary);
    }
    .chart-panel-toolbar-top-actions { display: flex; gap: 6px; }
    .chart-panel-icon-btn, .chart-panel-fs-btn {

      background: transparent;

      border-radius: 4px;

      gap: 16px;

    .ide-toolbar-group {

      align-items: center;

    .ide-toolbar-label {

      color: var(--qd-dark-text-secondary);

      top: 8px;
      display: flex;
      flex-wrap: wrap;
      gap: 4px;

    .indicator-btn {

      background: rgba(20, 20, 20, 0.9);
      border: 1px solid var(--qd-dark-border);
      border-radius: 4px;
      color: var(--qd-dark-text-secondary);
      font-size: 11px;
      cursor: pointer;

    .indicator-btn:hover {
      border-color: var(--qd-primary);
      color: var(--qd-primary);
    }
    .indicator-btn.active {
      background: var(--qd-primary);
      border-color: var(--qd-primary);
      color: white;

      left: 44px;
      top: 8px;
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      background: rgba(20, 20, 20, 0.9);
      padding: 4px;
      border-radius: 4px;
      border: 1px solid var(--qd-dark-border);

    .indicator-active-chip {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 2px 6px;
      background: rgba(255,255,255,0.05);
      border-radius: 4px;
      font-size: 11px;
    }
    .indicator-active-chip__label {
      color: var(--qd-dark-text);
      cursor: pointer;
    }
    .indicator-active-chip__action {
      color: var(--qd-dark-text-secondary);
      cursor: pointer;
      font-size: 10px;
    }
    .indicator-active-chip__action:hover { color: var(--qd-dark-text); }
    .indicator-active-chip--hidden .indicator-active-chip__label {
      text-decoration: line-through;
      color: var(--qd-dark-text-secondary);
    }

    .chart-overlay {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(20, 20, 20, 0.9);
    }
    .hint-box {

    .hint-box .hint-icon {

    .hint-title {

    .hint-desc {

      color: var(--qd-dark-text-secondary);

      height: 24px;
      border: 2px solid var(--qd-dark-border);

# [Sample] SuperTrend Trend-Following -- classic ATR channel flip
# Idea: build an adaptive band pair (HL2 +/- mult * ATR). The bands
# can only tighten in the prevailing trend direction; price crossing
# the bands in the prevailing trend fires a buy / sell signal.

# Design notes:
# Design notes uses Wilder smoothing (ewm alpha=1/N) so values match
# TradingView, MT5 and most pro charting tools.
# Final upper / lower bands are path-dependent: they cannot drift in
# the unfavourable direction, so we recurse bar by bar in a Python 
# loop instead of pure vectorization.
# Signals fire on the bar where direction flips -- naturally edge-triggered,
# no repeat entries while the trend persists.
# Direction is compared against the PREVIOUS final band only (c[l] vs final_[i-1]) 
# -> strictly no look-ahead bias.

@indicator
def SuperTrend(data):
    length = 10
    mult = 3.0
    
    high = data.high
    low = data.low
    close = data.close
    
    # Calculate typical price and ATR
    tp = (high + low + close) / 3
    atr = ta.atr(length=length)
    
    # Initialize bands
    final_upper = [0.0] * len(close)
    final_lower = [0.0] * len(close)
    direction = [1] * len(close)
    
    for i in range(length, len(close)):
        # Basic bands
        basic_upper = tp[i] + mult * atr[i]
        basic_lower = tp[i] - mult * atr[i]
        
        # Final bands (cannot expand against trend)
        if close[i] > final_upper[i-1]:
            final_upper[i] = max(basic_upper, final_upper[i-1])
        else:
            final_upper[i] = basic_upper
            
        if close[i] < final_lower[i-1]:
            final_lower[i] = min(basic_lower, final_lower[i-1])
        else:
            final_lower[i] = basic_lower
            
        # Determine direction
        if close[i] > final_upper[i-1]:
            direction[i] = 1
        elif close[i] < final_lower[i-1]:
            direction[i] = -1
        else:
            direction[i] = direction[i-1]
    
    # Plot bands and signals
    plot('SuperTrend Up', final_upper, color='#FFD700')
    plot('SuperTrend Down', final_lower, color='#FF4444')
    
    # Generate signals
    long_signal = (direction == 1) & (direction.shift(1) == -1)
    short_signal = (direction == -1) & (direction.shift(1) == 1)
    
    signal(long=long_signal, short=short_signal)
</textarea>

  <script>
    (function() {
      'use strict';
      
      const API_BASE = 'http://localhost:8080/api/v3/chart';
      let chart = null;
      let symbol = 'AAPL';
      let timeframe = '1D';
      let klineData = [];
      
      const $ = id => document.getElementById(id);
      
      // Initialize chart
      function initChart() {
        const container = $('kline-chart-container');
        if (!container) return;
        
        chart = klinecharts.init('kline-chart-container');
        if (!chart) return;
        
        // Dark theme styles
        chart.setStyles({
          candle: {
            type: 'candle_solid',
            upColor: '#3FB950',
            downColor: '#F85149',
            borderUpColor: '#3FB950',
            borderDownColor: '#F85149',
            wickUpColor: '#3FB950',
            wickDownColor: '#F85149'
          },
          grid: {
            horizontal: { color: 'rgba(255,255,255,0.04)' },
            vertical: { color: 'rgba(255,255,255,0.04)' }
          },
          xAxis: {
            axisLine: { color: 'rgba(255,255,255,0.08)' },
            tickLine: { color: 'rgba(255,255,255,0.08)' },
            tickText: { color: '#787b86', size: 10 }
          },
          yAxis: {
            axisLine: { color: 'rgba(255,255,255,0.08)' },
            tickLine: { color: 'rgba(255,255,255,0.08)' },
            tickText: { color: '#787b86', size: 10 }
          },
          separator: { color: '#2a2a2a' },
          crosshair: {
            horizontal: { color: 'rgba(255,255,255,0.12)', text: { color: '#d1d4dc' } },
            vertical: { color: 'rgba(255,255,255,0.12)', text: { color: '#d1d4dc' } }
          }
        });
        
        // Resize observer
        if (window.ResizeObserver) {
          new ResizeObserver(() => {
            try { chart.resize(); } catch(e) {}
          }).observe(container);
        }
      }
      
      // Load chart data
      async function loadChart() {
        const overlay = $('loadingOverlay');
        const hint = $('emptyHint');
        
        if (overlay) overlay.style.display = 'flex';
        if (hint) hint.style.display = 'none';
        
        try {
          const periodMap = { '1m': '1', '5m': '5', '15m': '15', '30m': '30', '1H': '60', '4H': '240', '1D': 'D', '1W': 'W' };
          const period = periodMap[timeframe] || 'D';
          
          const response = await fetch(`${API_BASE}/kline/${symbol}?limit=200&period=${period}`);
          const result = await response.json();
          
          if (!result.success || !result.data?.kline?.length) {
            // Generate mock data if no real data
            klineData = generateMockData();
          } else {
            klineData = result.data.kline.map(d => ({
              timestamp: d.time,
              open: d.open,
              high: d.high,
              low: d.low,
              close: d.close,
              volume: d.volume || 0
            }));
          }
          
          if (!chart) initChart();
          
          chart.clearData();
          chart.applyNewData(klineData);
          
          // Add default indicators
          chart.createIndicator('VOL', false, { id: 'vol', height: 80 });
          chart.createIndicator('MA', true, { id: 'ma', params: [20] });
          
          // Update status
          if (klineData.length > 0) {
            const first = new Date(klineData[0].timestamp * 1000).toLocaleDateString();
            const last = new Date(klineData[klineData.length - 1].timestamp * 1000).toLocaleDateString();
            $('dataRange').textContent = `${first} ~ ${last}`;
            $('dataCount').textContent = `${klineData.length}条`;
          }
          $('statusRight').textContent = `${symbol} | ${timeframe}`;
          
        } catch (error) {
          console.error('Failed to load chart data:', error);
          klineData = generateMockData();
          if (!chart) initChart();
          chart.clearData();
          chart.applyNewData(klineData);
          chart.createIndicator('VOL', false, { id: 'vol', height: 80 });
          chart.createIndicator('MA', true, { id: 'ma', params: [20] });
        } finally {
          if (overlay) overlay.style.display = 'none';
        }
      }
      
      // Generate mock data
      function generateMockData() {
        const data = [];
        let basePrice = 150;
        const now = Date.now();
        
        for (let i = 300; i >= 0; i--) {
          const volatility = (Math.random() - 0.5) * 4;
          const open = basePrice;
          const close = basePrice + volatility;
          const high = Math.max(open, close) + Math.random() * 2;
          const low = Math.min(open, close) - Math.random() * 2;
          
          data.push({
            timestamp: Math.floor((now - i * 86400000) / 1000),
            open: parseFloat(open.toFixed(2)),
            high: parseFloat(high.toFixed(2)),
            low: parseFloat(low.toFixed(2)),
            close: parseFloat(close.toFixed(2)),
            volume: Math.floor(Math.random() * 10000000) + 1000000
          });
          
          basePrice = close;
        }
        
        return data;
      }
      
      // Toggle indicator
      function toggleIndicator(indicatorId) {
        if (!chart) return;
        
        const btn = document.querySelector(`[data-indicator="${indicatorId}"]`);
        if (!btn) return;
        
        const isActive = btn.classList.contains('active');
        
        if (isActive) {
          btn.classList.remove('active');
          // Remove indicator
          try {
            chart.removeIndicator(indicatorId);
          } catch(e) {}
        } else {
          btn.classList.add('active');
          // Add indicator
          try {
            const params = {
              sma: [20],
              ema: [20],
              rsi: [14],
              macd: [],
              bb: [],
              atr: [14],
              cci: [20],
              williams: [14],
              mfi: [14],
              adx: [14],
              obv: [],
              kdj: []
            };
            
            const isStack = ['sma', 'ema', 'bb'].includes(indicatorId);
            chart.createIndicator(indicatorId.toUpperCase(), isStack, {
              id: indicatorId,
              params: params[indicatorId] || []
            });
          } catch(e) {
            console.error('Failed to add indicator:', e);
          }
        }
      }
      
      // Event listeners
      $('timeframeGroup').addEventListener('click', (e) => {
        const btn = e.target.closest('button');
        if (!btn) return;
        
        document.querySelectorAll('.tf-group button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        timeframe = btn.dataset.tf;
        loadChart();
      });
      
      $('symbolSelect').addEventListener('change', (e) => {
        symbol = e.target.value;
        loadChart();
      });
      
      $('indicatorToolbar').addEventListener('click', (e) => {
        const btn = e.target.closest('.indicator-btn');
        if (!btn) return;
        toggleIndicator(btn.dataset.indicator);
      });
      
      $('drawerHandle').addEventListener('click', () => {
        const leftPanel = $('leftPanel');
        const codeRail = $('codeRail');
        
        leftPanel.style.display = 'none';
        codeRail.style.display = 'flex';
      });
      
      $('codeRail').addEventListener('click', () => {
        const leftPanel = $('leftPanel');
        const codeRail = $('codeRail');
        
        leftPanel.style.display = 'flex';
        codeRail.style.display = 'none';
      });
      
      $('showCodeBtn').addEventListener('click', () => {
        const leftPanel = $('leftPanel');
        const codeRail = $('codeRail');
        
        if (leftPanel.style.display === 'none') {
          leftPanel.style.display = 'flex';
          codeRail.style.display = 'none';
        } else {
          leftPanel.style.display = 'none';
          codeRail.style.display = 'flex';
        }
      });
      
      $('fullscreenBtn').addEventListener('click', () => {
        if (!document.fullscreenElement) {
          document.documentElement.requestFullscreen();
        } else {
          document.exitFullscreen();
        }
      });
      
      // Initialize
      initChart();
      loadChart();
    })();
  </script>
