<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>A股指标IDE - 策略分析系统</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
        background: #141414;
      }
      #app {
        min-height: 100vh;
      }
      .loading-container {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        background: #141414;
        color: #d1d4dc;
      }
      .loading-title {
        font-size: 28px;
        font-weight: 600;
        margin-bottom: 24px;
        letter-spacing: 2px;
      }
      .loading-spinner {
        width: 40px;
        height: 40px;
        border: 3px solid #2a2a2a;
        border-top-color: #1890ff;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <noscript>
      <strong>本系统需要启用 JavaScript 才能正常运行。</strong>
    </noscript>
    <div id="app">
      <div class="loading-container">
        <div class="loading-title">A股指标IDE</div>
        <div class="loading-spinner"></div>
      </div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
