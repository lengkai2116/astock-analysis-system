<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>报告中心 — A股分析系统</title>

<style>
/* ── Toolbar ── */
.report-toolbar{display:flex;align-items:center;gap:var(--space-12);margin-bottom:var(--space-16);flex-wrap:wrap;}
.report-toolbar .input{width:180px;}
.date-input{width:140px;}

/* ── Report Card ── */
.report-card{background:var(--bg-surface);border:1px solid var(--border-default);border-radius:var(--radius-md);padding:var(--space-16);margin-bottom:var(--space-12);transition:all .15s;}
.report-card:hover{border-color:var(--border-strong);}
.rp-top{display:flex;justify-content:space-between;align-items:flex-start;gap:var(--space-8);}
.rp-top h4{font-size:14px;font-weight:600;margin:0;}
.rp-badges{display:flex;gap:4px;flex-shrink:0;}
.rp-meta{font-size:12px;color:var(--text-muted);margin-top:var(--space-4);}
.rp-desc{font-size:13px;color:var(--text-secondary);margin-top:var(--space-6);line-height:1.5;}
.rp-actions{display:flex;gap:var(--space-6);margin-top:var(--space-8);}
.rp-actions .btn{font-size:12px;padding:2px 10px;}

/* ── Type Tags ── */
.tag-strategy{background:#6366F1;color:#fff;font-size:11px;padding:0 6px;border-radius:3px;line-height:18px;}
.tag-analysis{background:#F59E0B;color:#fff;font-size:11px;padding:0 6px;border-radius:3px;line-height:18px;}
.tag-backtest{background:#10B981;color:#fff;font-size:11px;padding:0 6px;border-radius:3px;line-height:18px;}
.tag-diagnosis{background:#3B82F6;color:#fff;font-size:11px;padding:0 6px;border-radius:3px;line-height:18px;}
.tag-sandbox{background:#8B5CF6;color:#fff;font-size:11px;padding:0 6px;border-radius:3px;line-height:18px;}
.tag-downloaded{background:#10B981;color:#fff;font-size:10px;padding:0 5px;border-radius:3px;line-height:16px;}
.tag-undownloaded{background:#6B7280;color:#fff;font-size:10px;padding:0 5px;border-radius:3px;line-height:16px;}

/* ── Count Badge ── */
.report-count{font-size:12px;color:var(--text-muted);margin-left:auto;}

/* ── Detail Modal ── */
.modal-overlay{position:fixed;top:0;left:0;width:100%;height:100%;display:none;align-items:center;justify-content:center;z-index:1000;background:transparent;}
.report-modal{width:750px;max-width:92vw;max-height:85vh;display:flex;flex-direction:column;background:#0A0A0A;border:2px solid #666;border-radius:var(--radius-md);box-shadow:0 4px 24px rgba(0,0,0,.4);}
.rm-header{display:flex;justify-content:space-between;align-items:flex-start;padding:var(--space-16) var(--space-20);border-bottom:1px solid var(--border-default);flex-shrink:0;}
.rm-header h3{font-size:16px;font-weight:600;margin:0;}
.rm-meta{font-size:12px;color:var(--text-muted);margin-top:4px;display:flex;gap:12px;flex-wrap:wrap;}
.rm-body{flex:1;overflow-y:auto;padding:var(--space-16) var(--space-20);font-size:13px;line-height:1.7;color:var(--text-secondary);}
.rm-body::-webkit-scrollbar{width:6px;}
.rm-body::-webkit-scrollbar-thumb{background:var(--border-strong);border-radius:3px;}
.rm-body h5{margin:var(--space-12) 0 var(--space-6);color:var(--text-primary);font-size:14px;}
.rm-body pre{background:var(--bg-canvas);padding:var(--space-8);border-radius:var(--radius-sm);overflow-x:auto;font-size:12px;}
.rm-body table{width:100%;border-collapse:collapse;font-size:12px;margin:var(--space-8) 0;}
.rm-body th{text-align:left;padding:4px 6px;border-bottom:2px solid var(--border-default);font-weight:600;color:var(--text-secondary);}
.rm-body td{padding:4px 6px;border-bottom:1px solid var(--border-default);}
.rm-footer{display:flex;gap:var(--space-8);padding:var(--space-12) var(--space-20);border-top:1px solid var(--border-default);flex-shrink:0;justify-content:flex-end;}
.rm-footer .btn{font-size:12px;}

/* ── Batch download (default collapsed) ── */
.batch-toggle{display:block;width:100%;text-align:left;padding:var(--space-8) var(--space-12);background:var(--bg-surface);border:1px solid var(--border-default);border-radius:var(--radius-md);cursor:pointer;font-size:13px;color:var(--text-secondary);margin-bottom:4px;}
.batch-toggle:hover{border-color:var(--border-strong);}
.batch-panel{display:none;align-items:center;gap:var(--space-8);padding:var(--space-8) var(--space-12);background:var(--bg-surface);border:1px solid var(--border-default);border-top:none;border-radius:0 0 var(--radius-md) var(--radius-md);margin-bottom:var(--space-12);flex-wrap:wrap;}
.batch-panel.open{display:flex;}
.batch-panel label{font-size:12px;color:var(--text-secondary);}
.batch-panel .btn{font-size:12px;}
</style>
</head>

var _reports = [];

// ═══════════════════════════════════════════════════════════════
// §2 INIT
// ═══════════════════════════════════════════════════════════════
function initReports(){
  // Try reading from localStorage (跨页通信 — produced by playback)
  try{
    var lsData = localStorage.getItem('review_reports');
    if(lsData){
      var parsed = JSON.parse(lsData);
      if(parsed && parsed.length){
        // Merge downloaded status — mark previously downloaded items
        var localDownloaded = {};
        _reports.forEach(function(r){ if(r.downloaded) localDownloaded[r.id]=true; });
        parsed.forEach(function(r){
          if(localDownloaded[r.id]) r.downloaded = true;
          else r.downloaded = r.downloaded || false;
          if(!r.type) r.type = 'diagnosis'; // playback reports default to diagnosis
        });
        _reports = parsed;
        return;
      }
    }
  }catch(e){}
  // Fallback to mock data
  _reports = MOCK_REPORTS.slice();
}

function getTypeLabel(type){
  var labels = {strategy:'策略存档',analysis:'分析报告',backtest:'回测报告',diagnosis:'诊断报告',sandbox:'测试报告'};
  return labels[type] || type;
}

function getTypeClass(type){
  return 'tag-'+type;
}

function getSourceLabel(source){
  var map = {'indicator-ide':'个股策略分析','ai-analysis':'AI分析','backtest':'回测系统','playback':'复盘中心','strategy-sandbox':'策略沙箱'};
  return map[source] || source;
}

function renderReports(list){
  var el = document.getElementById('reportList');
  document.getElementById('reportCount').textContent = '共 '+list.length+' 份报告';
  if(!list.length){
    el.innerHTML = '';
    document.getElementById('reportEmpty').style.display = '';
    return;
  }
  document.getElementById('reportEmpty').style.display = 'none';
  el.innerHTML = list.map(function(r){
    var typeLabel = getTypeLabel(r.type);
    var typeCls = getTypeClass(r.type);
    var srcLabel = getSourceLabel(r.source);
    var pnlStr = r.pnl_pct ? (r.pnl_pct>=0?'+':'')+r.pnl_pct+'%' : '';
    var canDownload = r.type === 'diagnosis' || r.type === 'sandbox';
    var badges = '<span class="'+typeCls+'">'+typeLabel+'</span>';
    if(canDownload){
      var dlCls = r.downloaded ? 'tag-downloaded' : 'tag-undownloaded';
      var dlLabel = r.downloaded ? '已下载' : '未下载';
      badges += '<span class="'+dlCls+'">'+dlLabel+'</span>';
    }
    var actions = '<button class="btn btn-xs" onclick="viewReport(\''+r.id+'\')">👁 查看</button>';
    if(canDownload) actions += '<button class="btn btn-xs" onclick="downloadReport(\''+r.id+'\')">📥 下载</button>';
    return '<div class="report-card" data-id="'+r.id+'">'+
      '<div class="rp-top">'+
        '<h4>'+r.name+'</h4>'+
        '<div class="rp-badges">'+badges+'</div>'+
      '</div>'+
      '<div class="rp-meta">🔖 '+srcLabel+' · 📅 '+r.date+(r.total_score!==undefined?' · ⭐ 评分: '+r.total_score:'')+(pnlStr?' · 💰 '+pnlStr:'')+'</div>'+
      '<div class="rp-desc">'+(r.summary||'')+'</div>'+
      '<div class="rp-actions">'+actions+'</div>'+
    '</div>';
  }).join('');
}

// ═══════════════════════════════════════════════════════════════
// §3 FILTER
// ═══════════════════════════════════════════════════════════════
var _searchVal = '';
var _typeVal = '';

function filterReports(val){
  _searchVal = val || '';
  _typeVal = document.getElementById('typeFilter').value;
  applyFilters();
}

function applyFilters(){
  var filtered = _reports.filter(function(r){
    if(_typeVal && r.type !== _typeVal) return false;
    if(_searchVal){
      var s = _searchVal.toLowerCase();
      var searchFields = [r.name, r.ts_code, r.summary, getTypeLabel(r.type), getSourceLabel(r.source)];
      if(!searchFields.some(function(f){ return (f||'').toLowerCase().includes(s); })) return false;
    }
    return true;
  });
  renderReports(filtered);
}

// ═══════════════════════════════════════════════════════════════
// §4 VIEW (detail modal)
// ═══════════════════════════════════════════════════════════════
var _currentReportId = null;

function viewReport(reportId){
  _currentReportId = reportId;
  var r = _reports.find(function(x){ return x.id === reportId; });
  if(!r){ showToast('❌ 报告数据未找到'); return; }

  // Build detail from full report data — try localStorage first, then mock inline content
  var fullData = null;
  try{
    var raw = localStorage.getItem('review_report_data_'+reportId);
    if(raw) fullData = JSON.parse(raw);
  }catch(e){}

  var title = r.name;
  var metaHtml = '🔖 '+getSourceLabel(r.source)+' · 📅 '+(r.date||'')+ (r.ts_code?' · 📎 '+r.ts_code:'')+(r.total_score!==undefined?' · ⭐ 评分: '+r.total_score:'');
  var bodyHtml = '';

  if(fullData && fullData.analysis){
    // Real playback diagnosis data
    var a = fullData.analysis;
    bodyHtml = '<h5>📊 分层诊断得分</h5><table><tr><th>维度</th><th>得分</th><th>Layer</th></tr>'+
      (a.dimension_scores||[]).map(function(d){ return '<tr><td>'+d.name+'</td><td>'+d.score+'</td><td>'+d.layer+'</td></tr>'; }).join('')+'</table>'+
      '<h5>📋 诊断摘要</h5><pre>'+JSON.stringify(a.diagnostic_summary||{},null,2)+'</pre>'+
      (a.summary?'<p>'+a.summary+'</p>':'');
  } else if(r.content){
    // Mock — render markdown-like content
    bodyHtml = r.content.replace(/\n/g,'<br>').replace(/#{3,6} (.*?)(?:<br>|$)/g,'<h5>$1</h5>').replace(/## (.*?)(?:<br>|$)/g,'<h4>$1</h4>').replace(/# (.*?)(?:<br>|$)/g,'<h3>$1</h3>').replace(/\|(.+?)\|/g,function(m){ var cells=m.split('|').filter(Boolean).map(function(c){return '<td>'+c.trim()+'</td>';}).join(''); return '<tr>'+cells+'</tr>';}).replace(/(<tr>.*?<\/tr>){2,}/g,function(m){ return '<table>'+m+'</table>'; })+
      (r.interpretation?'<hr><h5>💡 AI分析</h5><p>'+(r.interpretation.summary||'')+'</p><ul>'+(r.interpretation.suggestions||[]).map(function(s){return '<li>'+s+'</li>';}).join('')+'</ul>':'');
  } else {
    bodyHtml = '<p style="color:var(--text-muted);">暂无详细报告内容</p>';
  }

  document.getElementById('rmTitle').textContent = title;
  document.getElementById('rmMeta').innerHTML = metaHtml;
  document.getElementById('rmBody').innerHTML = bodyHtml;
  // Conditionally show download button in modal footer
  var canDownload = r.type === 'diagnosis' || r.type === 'sandbox';
  var footer = document.getElementById('rmFooter');
  if(canDownload){
    footer.innerHTML = '<button class="btn" onclick="downloadFromModal()">📥 下载 JSON</button><button class="btn btn-secondary" onclick="closeReportDetail()">✕ 关闭</button>';
  } else {
    footer.innerHTML = '<button class="btn btn-secondary" onclick="closeReportDetail()">✕ 关闭</button>';
  }
  document.getElementById('detailModal').style.display = 'flex';
}

function closeReportDetail(){
  document.getElementById('detailModal').style.display = 'none';
  _currentReportId = null;
}

function downloadFromModal(){
  if(_currentReportId) downloadReport(_currentReportId);
}

// ═══════════════════════════════════════════════════════════════
// §5 DOWNLOAD
// ═══════════════════════════════════════════════════════════════
function downloadReport(reportId){
  var r = _reports.find(function(x){ return x.id === reportId; });
  if(!r){ showToast('❌ 报告数据未找到'); return; }

  // Try full data from localStorage first
  var dataStr = null;
  try{
    dataStr = localStorage.getItem('review_report_data_'+reportId);
  }catch(e){}

  if(!dataStr){
    // Fallback — build from mock
    dataStr = JSON.stringify(r, null, 2);
  }

  var blob = new Blob([dataStr], {type:'application/json'});
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = reportId + '.json';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);

  // Mark as downloaded
  r.downloaded = true;
  applyFilters();
  showToast('📥 报告已下载');
}

// ═══════════════════════════════════════════════════════════════
// §6 BATCH DOWNLOAD (diagnosis reports by date range, collapsed by default)
// ═══════════════════════════════════════════════════════════════
function toggleBatchPanel(){
  var panel = document.getElementById('batchPanel');
  var btn = document.getElementById('batchToggle');
  var isOpen = panel.classList.toggle('open');
  btn.textContent = isOpen ? '▼ 复盘诊断报告批量下载' : '▶ 复盘诊断报告批量下载';
}
function batchDownloadDiagnosis(){
  var startDate = document.getElementById('batchStartDate').value;
  var endDate = document.getElementById('batchEndDate').value;
  var statusEl = document.getElementById('batchStatus');

  if(!startDate || !endDate){
    showToast('❌ 请选择起止日期');
    return;
  }

  var targets = _reports.filter(function(r){
    if(r.type !== 'diagnosis') return false;
    return r.date >= startDate && r.date <= endDate;
  });

  if(!targets.length){
    statusEl.textContent = '⛔ 该时间段内无复盘诊断报告';
    showToast('⛔ 该时间段内无复盘诊断报告');
    return;
  }

  statusEl.textContent = '⏳ 正在下载 ' + targets.length + ' 份报告...';
  var idx = 0;

  function nextDownload(){
    if(idx >= targets.length){
      statusEl.textContent = '✅ 已下载 ' + targets.length + ' 份报告';
      showToast('✅ 批量下载完成，共 ' + targets.length + ' 份');
      return;
    }
    var r = targets[idx];
    downloadReport(r.id);
    idx++;
    statusEl.textContent = '⏳ 正在下载 ' + idx + '/' + targets.length + '...';
    setTimeout(nextDownload, 300);
  }

  nextDownload();
}

// ═══════════════════════════════════════════════════════════════
// §7 TOAST
// ═══════════════════════════════════════════════════════════════
function showToast(msg){
  var t = document.createElement('div');
  t.style.cssText = 'position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#1F2937;color:#fff;padding:8px 20px;border-radius:6px;font-size:13px;z-index:9999;transition:opacity .3s;box-shadow:0 2px 8px rgba(0,0,0,.15);';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(function(){ t.style.opacity='0'; setTimeout(function(){ document.body.removeChild(t); },300); },2000);
}

// ═══════════════════════════════════════════════════════════════
// §8 SIDEBAR
// ═══════════════════════════════════════════════════════════════
var sidebarCollapsed = true;
function toggleSidebar(){
  sidebarCollapsed = !sidebarCollapsed;
  var s=document.querySelector('.sidebar'),m=document.querySelector('.main-content');
  if(!s||!m)return;
  s.classList.toggle('collapsed');m.classList.toggle('collapsed');
  m.style.marginLeft=(sidebarCollapsed?64:200)+'px';
  var btn=document.querySelector('.sidebar-toggle');
  if(btn)btn.textContent=sidebarCollapsed?'▶':'◀';
}
(function(){
  var s=document.querySelector('.sidebar'),m=document.querySelector('.main-content');
  if(s)s.classList.add('collapsed');
  if(m){m.classList.add('collapsed');m.style.marginLeft='64px';}
  var btn=document.querySelector('.sidebar-toggle');
  if(btn)btn.textContent='▶';
})();

// ═══════════════════════════════════════════════════════════════
// §9 BOOT
// ═══════════════════════════════════════════════════════════════
initReports();
applyFilters();
</script>
