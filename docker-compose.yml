
# ═══════════════════════════════════════════════════════════
# Docker Compose 编排文件（可选）
# ═══════════════════════════════════════════════════════════
# 
# 推荐部署方式：裸跑（无需 Docker）
#   参见 _项目运行手册.md 或 170-Windows软件化迁移完整方案
#   Windows: 双击 start.bat
#   macOS: 双击 start.command
#
# 如需 PostgreSQL + Redis 环境或云服务器部署，可使用此文件：
#   docker compose up -d
# ═══════════════════════════════════════════════════════════

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: stock_user
      POSTGRES_PASSWORD: stock_password
      POSTGRES_DB: stock_analysis
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/migrations/init.sql:/docker-entrypoint-initdb.d/init.sql
    # ports: 5432 不暴露到宿主机（仅内部网络）
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stock_user -d stock_analysis"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    # ports: 6379 不暴露到宿主机（仅内部网络）
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      args:
        PIP_INDEX_URL: ${PIP_INDEX_URL:-https://pypi.org/simple/}
        PIP_TRUSTED_HOST: ${PIP_TRUSTED_HOST:-pypi.org}
    environment:
      - FLASK_APP=run.py
      - FLASK_ENV=production
      - DATABASE_URL=postgresql://stock_user:stock_password@postgres:5432/stock_analysis
      - REDIS_URL=redis://redis:6379/0
      - TUSHARE_TOKEN=${TUSHARE_TOKEN}
      - DATA_DIR=/data
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - DEEPSEEK_BASE_URL=${DEEPSEEK_BASE_URL:-https://api.deepseek.com/v1}
      - DEEPSEEK_MODEL=${DEEPSEEK_MODEL:-deepseek-chat-v4-flash}
      - LM_STUDIO_ENDPOINT=${LM_STUDIO_ENDPOINT:-http://localhost:1234/v1}
      - LM_STUDIO_MODEL=${LM_STUDIO_MODEL:-local-model}
      - AUTH_TOKEN=${AUTH_TOKEN}
      - CORS_ORIGIN=${CORS_ORIGIN}
      - LLM_PROVIDER=${LLM_PROVIDER:-mock}
      - SECRET_KEY=${SECRET_KEY}
    volumes:
      - ./backend:/app
      - ./data:/data
    ports:
      - "5001:5001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend/vue-project
      dockerfile: Dockerfile
    ports:
      - "9000:80"
    depends_on:
      backend:
        condition: service_healthy
    environment:
      - TZ=Asia/Shanghai
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/health"]
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
